name: Deploy i18n-api

on:
  push:
    branches: [main]
    paths:
      - 'apps/i18n-api/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            export HOME=/home/ubuntu
            export VOLTA_HOME="$HOME/.volta"
            export PATH="$VOLTA_HOME/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            echo "PATH=$PATH"
            which node
            which pnpm
            which pm2
            node -v
            pnpm -v
            cd ~/project/my-monorepo-project
            OLD_LOCK=$(md5sum pnpm-lock.yaml 2>/dev/null || echo "none")
            git pull origin main
            NEW_LOCK=$(md5sum pnpm-lock.yaml 2>/dev/null || echo "none")
            if [ "$OLD_LOCK" != "$NEW_LOCK" ]; then
              echo "pnpm-lock.yaml changed, installing dependencies..."
              pnpm install --frozen-lockfile
            fi
            pnpm --filter i18n-api db:generate:prod
            pnpm --filter i18n-api db:migrate:prod
            pnpm --filter i18n-api build
            pm2 restart i18n-api
            pm2 save
            pm2 status
