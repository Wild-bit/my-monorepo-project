name: Deploy i18n-api

on:
  push:
    branches: [main]
    paths:
      - 'apps/i18n-api/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/project/my-monorepo-project
            OLD_LOCK=$(md5sum pnpm-lock.yaml 2>/dev/null || echo "none")
            git pull origin main
            NEW_LOCK=$(md5sum pnpm-lock.yaml 2>/dev/null || echo "none")
            if [ "$OLD_LOCK" != "$NEW_LOCK" ]; then
              echo "pnpm-lock.yaml changed, installing dependencies..."
              pnpm install --frozen-lockfile
            fi
            cd apps/i18n-api
            pnpm db:generate:prod
            pnpm db:migrate:prod
            pnpm build
            pm2 restart i18n-api
